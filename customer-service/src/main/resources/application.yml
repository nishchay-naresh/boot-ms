server:
  port: 4040

spring:
  application:
    name: customer-service


  # database config
  datasource:
    url: jdbc:h2:mem:customers_data
    driver-class-name: org.h2.Driver
    username: sa
    password:

  #  enabling the H2 console
  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8040/eureka/
    fetch-registry: true
    register-with-eureka: true

